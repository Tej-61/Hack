<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page Clone (Educational Project)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .screen {
    width: 100%;
    max-width: 400px;
    padding: 24px 28px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .lang-selector {
    color: #65676b;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 50px;
    cursor: pointer;
  }

  .lang-selector .chevron {
    font-size: 11px;
    margin-top: 1px;
  }

  .logo {
    margin-bottom: 55px;
  }

  form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  input {
    width: 100%;
    padding: 16px 20px;
    border: 1px solid #dbdbdb;
    border-radius: 28px;
    font-size: 15px;
    background: #fff;
    color: #262626;
  }

  input::placeholder { color: #8e8e8e; }

  input:focus {
    outline: none;
    border-color: #8e8e8e;
  }

  .login-btn {
    width: 100%;
    background: #0064FA;
    color: #fff;
    border: none;
    border-radius: 28px;
    padding: 15px;
    font-weight: 600;
    font-size: 16px;
    margin-top: 4px;
    cursor: pointer;
  }

  .login-btn:disabled {
    background: #b3d3fd;
    cursor: default;
  }

  .forgot {
    color: #262626;
    font-weight: 600;
    font-size: 15px;
    margin-top: 22px;
    cursor: pointer;
    text-align: center;
  }

  .spacer {
    flex: 1;
    min-height: 70px;
  }

  .create-account-btn {
    width: 100%;
    background: #fff;
    color: #0064FA;
    border: 1px solid #0064FA;
    border-radius: 28px;
    padding: 15px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    margin-top: 30px;
  }

  .meta-logo {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 26px;
    color: #1c1e21;
    font-weight: 700;
    font-size: 18px;
  }

  #demo-message {
    margin-top: 16px;
    font-size: 13px;
    color: #2e7d32;
    text-align: center;
    display: none;
  }

  .notice {
    margin-top: 30px;
    text-align: center;
    font-size: 11px;
    color: #a8a8a8;
    line-height: 1.5;
  }
</style>
</head>
<body>

  <div class="screen">

    <div class="lang-selector">English (UK) <span class="chevron">▾</span></div>

    <div class="logo">
      <svg width="88" height="88" viewBox="0 0 96 96">
        <defs>
          <linearGradient id="igGradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFD600"/>
            <stop offset="25%" stop-color="#FF7A00"/>
            <stop offset="50%" stop-color="#FF0169"/>
            <stop offset="75%" stop-color="#D300C5"/>
            <stop offset="100%" stop-color="#7638FA"/>
          </linearGradient>
        </defs>
        <rect x="6" y="6" width="84" height="84" rx="22" ry="22" fill="none" stroke="url(#igGradient)" stroke-width="6"/>
        <circle cx="48" cy="48" r="19" fill="none" stroke="url(#igGradient)" stroke-width="6"/>
        <circle cx="70" cy="26" r="4" fill="url(#igGradient)"/>
      </svg>
    </div>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Username, email address or mobile number" autocomplete="off">
      <input type="password" id="password" placeholder="Password" autocomplete="off">
      <button type="submit" class="login-btn" id="loginBtn" disabled>Log in</button>
    </form>

    <p id="demo-message">✅ Demo only — no data was sent or stored anywhere.</p>

    <div class="forgot">Forgotten password?</div>

    <div class="spacer"></div>

    <button class="create-account-btn">Create new account</button>

    <div class="meta-logo">
      <svg width="30" height="18" viewBox="0 0 32 18" fill="none">
        <path d="M8 2C4 2 2 5.5 2 9s2 7 6 7c3.2 0 5.3-2.6 7-5.2 1.7 2.6 3.8 5.2 7 5.2 4 0 6-3.5 6-7s-2-7-6-7c-3.2 0-5.3 2.6-7 5.2C13.3 4.6 11.2 2 8 2z" stroke="#0064E0" stroke-width="2.6" fill="none" stroke-linecap="round"/>
      </svg>
      Meta
    </div>

    <p class="notice">
      🎓 Educational UI clone — not affiliated with Instagram or Meta.<br>No data is collected, stored, or transmitted anywhere.
    </p>

  </div>

  <script>
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const form = document.getElementById('loginForm');
    const demoMessage = document.getElementById('demo-message');

    function toggleButton() {
      loginBtn.disabled = !(username.value.trim() && password.value.trim());
    }

    username.addEventListener('input', toggleButton);
    password.addEventListener('input', toggleButton);

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      // Educational demo only: nothing is sent anywhere.
      demoMessage.style.display = 'block';
      form.reset();
      loginBtn.disabled = true;
    });
  </script>

</body>
</html>
